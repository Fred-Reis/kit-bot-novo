services:
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - apps/bot/.env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis

  postgres:
    container_name: postgres
    image: postgres:15
    command: ["postgres", "-c", "max_connections=1000"]
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - 5432

  redis:
    image: redis:latest
    container_name: redis
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: bot
    ports:
      - "8000:8000"
    env_file:
      - apps/bot/.env
    environment:
      - NODE_ENV=production
    depends_on:
      - evolution-api
      - redis
      - postgres
    restart: always

volumes:
  evolution_instances:
  postgres_data:
  redis_data:
